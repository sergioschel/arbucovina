<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mural Bucovina – AR</title>

  <!-- ✅ SCRIPT CORRETO -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.jsscript src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    #info-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 16px 18px;
      border-radius: 12px;
      max-width: 85%;
      display: none;
      font-size: 15px;
      line-height: 1.4;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div id="info-box"></div>

  <a-scene
    mindar-image="imageTargetSrc: painel.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <!-- CÂMERA -->
    <a-camera position="0 0 0" look-controls="enabled: false">
      <a-cursor
        fuse="true"
        fuse-timeout="700"
        raycaster="objects: .zona"
        material="opacity: 0">
      </a-cursor>
    </a-camera>

    <!-- IMAGEM RECONHECIDA -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 🔹 ZONA INVISÍVEL -->
      <a-plane class="zona"
        position="-0.25 0.3 0"
        width="0.25"
        height="0.25"
        material="opacity:0"
        onmouseenter="mostrar('Elemento 1 – Texto genérico explicativo sobre esta área do mural.')"
        onmouseleave="esconder()">
      </a-plane>

    </a-entity>
  </a-scene>

  <script>
    function mostrar(texto) {
      const box = document.getElementById("info-box");
      box.innerText = texto;
      box.style.display = "block";
    }

    function esconder() {
      document.getElementById("info-box").style.display = "none";
    }
  </script>

</body>
</html>
