<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Mural Bucovina – Realidade Aumentada</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    #info-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 16px 18px;
      border-radius: 12px;
      max-width: 85%;
      display: none;
      z-index: 10;
      font-size: 15px;
      line-height: 1.4;
    }

    #close-btn {
      margin-top: 10px;
      text-align: right;
      font-size: 13px;
      opacity: 0.8;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="info-box"></div>

  <a-scene
    mindar-image="imageTargetSrc: painel.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <!-- câmera com cursor invisível -->
    <a-camera position="0 0 0" look-controls="enabled: false">
      <a-cursor
        fuse="true"
        fuse-timeout="600"
        raycaster="objects: .zona"
        material="opacity: 0">
      </a-cursor>
    </a-camera>

    <!-- mural reconhecido -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- ✅ ELEMENTO 1 -->
      <a-plane class="zona"
        position="-0.38 0.32 0"
        width="0.22"
        height="0.22"
        material="opacity:0"
        onmouseenter="mostrar('Elemento 1 – Texto educativo genérico para esta parte do mural.')"
        onmouseleave="esconder()">
      </a-plane>

      <!-- ✅ ELEMENTO 2 -->
      <a-plane class="zona"
        position="-0.12 0.34 0"
        width="0.22"
        height="0.22"
        material="opacity:0"
        onmouseenter="mostrar('Elemento 2 – Informação histórica, cultural ou simbólica.')"
        onmouseleave="esconder()">
      </a-plane>     

    </a-entity>
  </a-scene>

  <script>
    function mostrar(texto) {
      const box = document.getElementById("info-box");
      box.innerText = texto;
      box.style.display = "block";
    }

    function esconder() {
      document.getElementById("info-box").style.display = "none";
    }
  </script>

</body>
</html>
