<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Mural Bucovina – Realidade Aumentada</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    #info-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 16px 18px;
      border-radius: 12px;
      max-width: 85%;
      display: none;
      z-index: 10;
      font-size: 15px;
      line-height: 1.4;
    }

    #close-btn {
      margin-top: 10px;
      text-align: right;
      font-size: 13px;
      opacity: 0.8;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Caixa de texto -->
  <div id="info-box">
    <div id="info-text">Texto</div>
    <div id="close-btn" onclick="fecharInfo()">Fechar</div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: painel.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target da imagem -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 🔴 HOTSPOTS -->
      <!-- Ajuste position="x y z" conforme o mural -->

      <!-- Modelo:
      <a-sphere position="0 0 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Texto')"></a-sphere>
      -->

      <a-sphere position="-0.4 0.3 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 1 – Texto explicativo genérico sobre este ponto do mural.')"></a-sphere>

      <a-sphere position="-0.25 0.32 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 2 – Descrição histórica ou simbólica relacionada à cena.')"></a-sphere>

      <a-sphere position="-0.1 0.3 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 3 – Informação educativa associada ao painel.')"></a-sphere>

      <a-sphere position="0.05 0.32 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 4 – Este ponto representa parte da narrativa visual.')"></a-sphere>

      <a-sphere position="0.2 0.3 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 5 – Conteúdo explicativo que contextualiza a imagem.')"></a-sphere>

      <a-sphere position="-0.45 0.05 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 6 – Cena ligada ao cotidiano e à cultura cervejeira.')"></a-sphere>

      <a-sphere position="-0.3 0.05 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 7 – Representação do trabalho e da tradição.')"></a-sphere>

      <a-sphere position="-0.15 0.05 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 8 – Parte visual que reforça a identidade local.')"></a-sphere>

      <a-sphere position="0 0.05 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 9 – Detalhe artístico integrado à história da Bucovina.')"></a-sphere>

      <a-sphere position="0.15 0.05 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 10 – Simboliza convivência, encontro e celebração.')"></a-sphere>

      <a-sphere position="-0.4 -0.2 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 11 – Ingredientes e processos cervejeiros.')"></a-sphere>

      <a-sphere position="-0.25 -0.2 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 12 – Etapa fundamental da produção da cerveja.')"></a-sphere>

      <a-sphere position="-0.1 -0.2 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 13 – Conhecimento técnico aplicado à prática.')"></a-sphere>

      <a-sphere position="0.05 -0.2 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 14 – Parte do processo artesanal.')"></a-sphere>

      <a-sphere position="0.2 -0.2 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 15 – A importância do tempo e da fermentação.')"></a-sphere>

      <a-sphere position="-0.45 -0.45 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 16 – Origem e fundação da cervejaria.')"></a-sphere>

      <a-sphere position="-0.3 -0.45 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 17 – Crescimento e consolidação da marca.')"></a-sphere>

      <a-sphere position="-0.15 -0.45 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 18 – Produção como espaço vivo e coletivo.')"></a-sphere>

      <a-sphere position="0 -0.45 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 19 – Estilos e diversidade de cervejas.')"></a-sphere>

      <a-sphere position="0.15 -0.45 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 20 – Qualidade e cuidado em cada etapa.')"></a-sphere>

      <a-sphere position="0.35 -0.3 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 21 – Sustentabilidade e responsabilidade.')"></a-sphere>

      <a-sphere position="0.35 -0.1 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 22 – Educação cervejeira e cultura.')"></a-sphere>

      <a-sphere position="0.35 0.1 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 23 – A cerveja como patrimônio cultural.')"></a-sphere>

      <a-sphere position="0.35 0.3 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 24 – Inovação e novos caminhos.')"></a-sphere>

      <a-sphere position="0 0.55 0" radius="0.045" color="#ff0000"
        onclick="mostrarInfo('Elemento 25 – Celebração da história e do futuro da Bucovina.')"></a-sphere>

    </a-entity>
  </a-scene>

  <script>
    function mostrarInfo(texto) {
      document.getElementById("info-text").innerText = texto;
      document.getElementById("info-box").style.display = "block";
    }

    function fecharInfo() {
      document.getElementById("info-box").style.display = "none";
    }
  </script>

</body>
</html>
