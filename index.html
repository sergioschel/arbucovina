<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>
    <a-scene
      mindar-image="imageTargetSrc: targets.mind"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
    >

      <!-- ASSETS -->
      <a-assets>
        <img id="img0" src="assets/0.png" />
        <img id="img1" src="assets/1.png" />
        <img id="img2" src="assets/2.png" />
        <img id="img3" src="assets/3.png" />
        <img id="img4" src="assets/4.png" />
        <img id="img5" src="assets/5.png" />
        <img id="img6" src="assets/6.png" />
      </a-assets>

      <!-- CAMERA (INTACTA) -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- ================= TARGET 0 ================= -->
      <a-entity mindar-image-target="targetIndex: 0"
                animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 350">

        <!-- IMAGEM -->
        <a-plane
          src="#img0"
          position="0 -0.05 0"
          width="1"
          height="0.6">
        </a-plane>

        <!-- FUNDO DO TEXTO -->
        <a-plane
          position="0 -0.45 0"
          width="1.05"
          height="0.32"
          material="color: black; opacity: 0.7">
        </a-plane>

        <!-- TEXTO -->
        <a-text
          value="Elemento histórico 1 – descrição curta e objetiva."
          position="0 -0.45 0.01"
          width="1.9"
          align="center"
          color="white"
          wrap-count="36">
        </a-text>

      </a-entity>

      <!-- ================= TARGET 1 ================= -->
      <a-entity mindar-image-target="targetIndex: 1"
                animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 350">

        <a-plane src="#img1" position="0 -0.05 0" width="1" height="0.6"></a-plane>

        <a-plane
          position="0 -0.45 0"
          width="1.05"
          height="0.32"
          material="color: black; opacity: 0.7">
        </a-plane>

        <a-text
          value="Elemento histórico 2 – explicação contextual."
          position="0 -0.45 0.01"
          width="1.9"
          align="center"
          color="white"
          wrap-count="36">
        </a-text>

      </a-entity>

      <!-- ================= TARGET 2 ================= -->

                animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 350">

        <a-plane
          position="0 -0.45 0"
          width="1.05"
          height="0.32"
          material="color: black; opacity: 0.7">
        </a-plane>

        <a-text
          value="Elemento 3 – explicação contextual."
          position="0 -0.45 0.01"
          width="1.9"
          align="center"
          color="white"
          wrap-count="36">
        </a-text>

      </a-entity>

      <!-- ================= TARGET 3 ================= -->

          position="0 -0.45 0"

          height="0.32"

        <a-text

          position="0 -0.45 0.01"
          width="1.9"
          align="center"
          color="white"
          wrap-count="36">
        </a-text>

      </a-entity>

      <!-- ================= TARGET 4 ================= -->

          position="0 -0.45 0"

        </a-plane>

        <a-text

        </a-text>

      </a-entity>

        <a-plane src="#img6" position="0 -0.05 0" width="1" height="0.6"></a-plane>

    </a-scene>
  </body>
</html>
