<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DEBUG – Mural Bucovina</title>

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #info-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 14px 16px;
      border-radius: 10px;
      display: none;
      max-width: 85%;
      font-family: Arial;
      font-size: 15px;
    }
  </style>
</head>

<body>

<div id="info-box">DEBUG TEXTO</div>

<a-scene
  mindar-image="imageTargetSrc: painel.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true">

  <!-- ⚠️ LOOK-CONTROLS ATIVADO -->
  <a-camera look-controls="enabled: true">
    <!-- CURSOR VISÍVEL PARA DEBUG -->
    <a-cursor
      fuse="true"
      fuse-timeout="500"
      raycaster="objects: .zona"
      color="yellow">
    </a-cursor>
  </a-camera>

  <!-- TARGET -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- ZONA VISÍVEL PARA DEBUG -->
    <a-plane class="zona"
      position="0 0 0"
      width="0.4"
      height="0.4"
      material="color:red; opacity:0.6"
      onmouseenter="mostrar('✅ FUNCIONOU! Elemento detectado')"
      onmouseleave="esconder()">
    </a-plane>

  </a-entity>
</a-scene>

<script>
  function mostrar(txt) {
    const box = document.getElementById('info-box');
    box.innerText = txt;
    box.style.display = 'block';
  }

  function esconder() {
    document.getElementById('info-box').style.display = 'none';
  }
</script>

</body>
</html>
